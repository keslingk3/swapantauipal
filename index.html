<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Swapantau Limbah Cair</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      background: #f0f7f4;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .form-container {
      max-width: 800px;
      margin: 40px auto;
    }
    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .card-header {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      border-radius: 20px 20px 0 0 !important;
      padding: 25px;
      border-bottom: none;
    }
    .section-title {
      color: #11998e;
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 2px;
      background: #e9ecef;
      border-radius: 2px;
    }
    .form-floating > label {
      color: #6c757d;
      padding-left: 1.5rem;
    }
    .form-control {
      border-radius: 10px;
      border: 1px solid #ced4da;
    }
    .form-control:focus {
      border-color: #38ef7d;
      box-shadow: 0 0 0 0.25rem rgba(56, 239, 125, 0.25);
    }
    .btn-submit {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
      color: white;
    }
    .icon-label {
      width: 20px;
      text-align: center;
      margin-right: 8px;
    }
  </style>
</head>
<body>

  <div class="container form-container">
    <div class="card">
      <div class="card-header text-white text-center">
        <h3 class="mb-1"><i class="fas fa-leaf me-2"></i>Swapantau Limbah Cair</h3>
        <p class="mb-0 opacity-75">Formulir Input Data Lapangan</p>
      </div>
      
      <div class="card-body p-4 p-md-5">
        
        <div id="alert" class="alert alert-success d-none align-items-center" role="alert">
          <i class="fas fa-check-circle me-2 fs-4"></i>
          <div>Data swapantau berhasil dikirim ke database!</div>
        </div>
        
        <form id="formLimbah" name="form-limbah">
          
          <div class="section-title">
            <i class="fas fa-info-circle"></i> Informasi Umum
          </div>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <div class="form-floating">
                <input type="text" class="form-control" id="nama" name="nama" placeholder="Nama Pemeriksa" required>
                <label for="nama"><i class="fas fa-user icon-label"></i>Nama Pemeriksa</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating">
                <input type="date" class="form-control" id="tanggal" name="tanggal" placeholder="Tanggal" required>
                <label for="tanggal"><i class="fas fa-calendar-alt icon-label"></i>Tanggal Pengecekan</label>
              </div>
            </div>
          </div>

          <div class="section-title">
            <i class="fas fa-vial"></i> Parameter Utama
          </div>
          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" step="0.01" class="form-control" id="ph" name="ph" placeholder="pH" required>
                <label for="ph"><i class="fas fa-tint icon-label"></i>Derajat Asam (pH)</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="suhu" name="suhu" placeholder="Suhu" required>
                <label for="suhu"><i class="fas fa-thermometer-half icon-label"></i>Suhu (°C)</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="tds" name="tds" placeholder="TDS" required>
                <label for="tds"><i class="fas fa-water icon-label"></i>TDS (mg/L)</label>
              </div>
            </div>
          </div>

          <div class="section-title">
            <i class="fas fa-water"></i> Pengecekan Debit
          </div>
          <div class="row g-3 mb-4">
            <div class="col-md-4 col-6">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="debit_bpa" name="debit_bpa" placeholder="Debit BPA" required>
                <label for="debit_bpa">Debit BPA</label>
              </div>
            </div>
            <div class="col-md-4 col-6">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="debit_sbr1" name="debit_sbr1" placeholder="Debit SBR1" required>
                <label for="debit_sbr1">Debit SBR1</label>
              </div>
            </div>
            <div class="col-md-4 col-12">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="debit_sbr2" name="debit_sbr2" placeholder="Debit SBR2" required>
                <label for="debit_sbr2">Debit SBR2</label>
              </div>
            </div>
            <div class="col-md-6 col-6">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="debit_sbr3" name="debit_sbr3" placeholder="Debit SBR3" required>
                <label for="debit_sbr3">Debit SBR3</label>
              </div>
            </div>
            <div class="col-md-6 col-6">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="debit_outlet_ipal" name="debit_outlet_ipal" placeholder="Debit Outlet IPAL" required>
                <label for="debit_outlet_ipal">Debit Outlet IPAL</label>
              </div>
            </div>
          </div>

          <div class="section-title">
            <i class="fas fa-flask"></i> Pengecekan SV30 (Opsional)
          </div>
          <div class="row g-3 mb-5">
            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="sv30_sbr1" name="sv30_sbr1" placeholder="SV30 SBR1">
                <label for="sv30_sbr1">SV30 SBR1</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="sv30_sbr2" name="sv30_sbr2" placeholder="SV30 SBR2">
                <label for="sv30_sbr2">SV30 SBR2</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="sv30_sbr3" name="sv30_sbr3" placeholder="SV30 SBR3">
                <label for="sv30_sbr3">SV30 SBR3</label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 btn-submit text-white" id="btnSubmit">
            <i class="fas fa-paper-plane me-2"></i>KIRIM DATA LAPORAN
          </button>
          
        </form>
      </div>
    </div>
  </div>

  <script>
    // 🚀 URL FIREBASE BARU ANDA (Tambahkan /SWAPANTAU_IPAL.json di ujungnya)
    const firebaseUrl = 'https://sikasik-7b9ce-default-rtdb.asia-southeast1.firebasedatabase.app/SWAPANTAU_IPAL.json'; 
    
    const form = document.forms['form-limbah'];
    const btnSubmit = document.getElementById('btnSubmit');
    const alertBox = document.getElementById('alert');

    // Set nilai default tanggal hari ini saat form dimuat
    document.getElementById('tanggal').valueAsDate = new Date();

    form.addEventListener('submit', e => {
      e.preventDefault();
      
      // Ubah tampilan tombol jadi loading
      btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Mengirim...';
      btnSubmit.disabled = true;

      // 1. Ambil semua data dari form
      const formData = new FormData(form);
      const dataToSave = {};
      
      formData.forEach((value, key) => {
        dataToSave[key] = value;
      });
      
      // Tambahkan timestamp kapan data ini diinput
      dataToSave['timestamp'] = new Date().toISOString();

      // 2. Kirim data ke Firebase menggunakan metode POST
      fetch(firebaseUrl, { 
        method: 'POST', 
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(dataToSave) // Data diubah jadi format JSON
      })
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        return response.json();
      })
      .then(data => {
        // Tampilkan notifikasi sukses
        alertBox.classList.remove('d-none');
        alertBox.classList.add('d-flex');
        
        // Reset form
        form.reset();
        document.getElementById('tanggal').valueAsDate = new Date(); 
        
        // Kembalikan tombol ke keadaan semula
        btnSubmit.innerHTML = '<i class="fas fa-paper-plane me-2"></i>KIRIM DATA LAPORAN';
        btnSubmit.disabled = false;
        
        // Hilangkan notifikasi sukses setelah 4 detik
        setTimeout(() => {
          alertBox.classList.add('d-none');
          alertBox.classList.remove('d-flex');
        }, 4000);
      })
      .catch(error => {
        console.error('Error!', error.message);
        alert('Terjadi kesalahan saat mengirim data ke Firebase. Silakan coba lagi.');
        btnSubmit.innerHTML = '<i class="fas fa-paper-plane me-2"></i>KIRIM DATA LAPORAN';
        btnSubmit.disabled = false;
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
